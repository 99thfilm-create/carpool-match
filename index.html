<h2 class="sr-only">계룡대 카풀 매칭 서비스</h2>

</div>

// 세그먼트 버튼 — .on 강제 유지
function segSet(id,idx){
  const btns=document.getElementById(id).querySelectorAll('button');
  btns.forEach((b,i)=>{
    if(i===idx){b.classList.add('on');}
    else{b.classList.remove('on');}
  });
}

function setRole(r,idx){
  role=r;
  segSet('role-seg',idx);
  document.getElementById('contact-wrap').style.display=r==='driver'?'flex':'none';
  document.getElementById('via-wrap').style.display=r==='driver'?'block':'none';
  document.getElementById('seat-wrap').style.display=r==='driver'?'block':'none';
  document.getElementById('pref-label').textContent=r==='driver'?'탑승 희망자 성별':'운전 희망자 성별';
  document.getElementById('btn-submit').textContent=r==='passenger'?'카풀 매칭':'등록하기';
}
function setGender(g,idx){myGender=g;segSet('gender-seg',idx);}
function setPref(g,idx){myPref=g;segSet('pref-seg',idx);}
function setDir(d,idx){direction=d;segSet('dir-seg',idx);renderStartWrap();renderEndWrap();}
function chSeat(d){seats=Math.max(1,Math.min(6,seats+d));document.getElementById('seat-n').textContent=seats;}
function setFilter(f,el){filter=f;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));el.classList.add('on');renderListPage();}

function updateDist(type){
  const c=document.getElementById('r-'+type+'-city'),d=document.getElementById('r-'+type+'-dist');
  if(!c||!d)return;
  const city=c.value;
  if(!city||!DIST[city]){d.innerHTML='<option value="">-</option>';d.disabled=true;return;}
  d.innerHTML='<option value="">구/읍/면 선택</option>'+Object.keys(DIST[city]).map(k=>`<option>${k}</option>`).join('');
  d.disabled=false;
}
function setDistVal(type,v){
  setTimeout(()=>{const d=document.getElementById('r-'+type+'-dist');if(d)for(let o of d.options)if(o.value===v){o.selected=true;break;}},100);
}
function gateOpts(sel){return '<option value="">선택</option>'+GATES.map(g=>`<option${g===sel?' selected':''}>${g}</option>`).join('');}

    <div class="fg"><label>상세 주소 <span style="font-size:11px;color:#bbb">(선택)</span></label>

  const w=document.getElementById('end-wrap');if(!w)return;
  if(direction==='to'){
    w.innerHTML=`<div class="loc-title">목적지 (정문)</div>
    <select id="r-end-gate" style="width:100%">${gateOpts('')}</select>`;
  } else {
    w.innerHTML=`<div class="loc-title">목적지</div>
    <div class="loc-row">
      <div class="fg"><label>권역</label><select id="r-end-city" onchange="updateDist('end')"><option value="">권역 선택</option><option>대전</option><option>세종</option><option>논산</option><option>공주</option><option>계룡</option></select></div>
      <div class="fg"><label>세부 지역</label><select id="r-end-dist" disabled><option value="">먼저 권역 선택</option></select></div>

    <div class="fg"><label>상세 주소 <span style="font-size:11px;color:#bbb">(선택)</span></label>

function goReg(){
  document.getElementById('page-list').style.display='none';
  document.getElementById('page-reg').style.display='block';
  document.getElementById('btn-recall').style.display=lastSaved&&!editingId?'block':'none';
  window.scrollTo(0,0);
}
function goList(){
  document.getElementById('page-reg').style.display='none';
  document.getElementById('page-list').style.display='block';
  renderListPage();
  window.scrollTo(0,0);
}

function routeLabel(c){
  const s=c.dir==='to'?(c.startCity+' '+c.startDist):(c.startGate||'');
  const e=c.dir==='to'?(c.endGate||''):(c.endCity+' '+(c.endDist||''));
  const via=c.viaCity&&c.viaDist?` <span style="color:#bbb;font-size:11px">›</span> ${c.viaCity} ${c.viaDist}`:'';
  return `${s}${via} <span style="color:#bbb;font-size:11px">→</span> ${e}`;
}

function toggleStatus(id){
  const c=carpools.find(x=>x.id===id);if(!c)return;
  c.status=c.status==='open'?'closed':'open';
  renderMyCard();renderListPage();
  showToast(c.status==='closed'?'마감으로 변경됐어요':'모집중으로 변경됐어요');
}

function renderMyCard(){
  const w=document.getElementById('my-info-wrap');
  const c=myId?carpools.find(x=>x.id===myId):null;
  if(!c){
    w.innerHTML=`<div class="no-my"><span>내 정보를 등록하면 매칭 적합도가 표시됩니다</span><button onclick="goReg()">등록하기</button></div>`;
    return;
  }
  const isOpen=c.status==='open';
  w.innerHTML=`<div class="my-card">
    <div class="my-hd">
      <div>
        <div class="my-title">내 등록 (${c.role==='driver'?'운전자':'탑승자'} · ${c.dir==='to'?'출근':'퇴근'})</div>
        <div class="my-date">${c.date} ${dayStr(c.date)}</div>
      </div>
      <div class="my-btns">
        ${c.role==='driver'?`<button class="btn-sm ${isOpen?'btn-close-rec':'btn-reopen'}" onclick="toggleStatus(${c.id})">${isOpen?'마감':'모집중'}</button>`:''}
        <button class="btn-sm btn-edit" onclick="editCard(${c.id})">수정</button>

      </div>
    </div>
    <div class="my-route">${routeLabel(c)}</div>
    ${(c.dir==='to'&&c.startAddr)||(c.dir==='from'&&c.endAddr)?`<div style="font-size:11px;color:#aaa;margin-bottom:4px">&#128205; ${c.dir==='to'?c.startAddr:c.endAddr}</div>`:''}
    <div class="my-meta">
      <span class="status-badge ${isOpen?'status-open':'status-closed'}">${isOpen?'모집중':'마감'}</span>
      <span>&#128336; ${c.depart}→${c.arrive}</span>
      ${c.role==='driver'?`<span>&#128100; ${c.seats}석</span>`:''}
      <span>${GL[c.gender]} · 희망 ${GL[c.pref]}</span>
    </div>
  </div>`;
}

function calcMatch(driver,passenger){
  if(driver.dir!==passenger.dir||driver.status==='closed')return null;
  if(driver.date&&passenger.date&&driver.date!==passenger.date)return null;
  let score=0;const reasons=[];
  const dCity=driver.dir==='to'?driver.startCity:driver.endCity;
  const pCity=passenger.dir==='to'?passenger.startCity:passenger.endCity;
  const dCities=[dCity,driver.viaCity].filter(Boolean);
  const gm=driver.dir==='to'?(driver.endGate===passenger.endGate&&driver.endGate!=='상관없음'):(driver.startGate===passenger.startGate&&driver.startGate!=='상관없음');
  if(!dCities.includes(pCity)&&!gm)return null;
  if(dCity===pCity){score+=35;const dD=driver.dir==='to'?driver.startDist:driver.endDist;const pD=passenger.dir==='to'?passenger.startDist:passenger.endDist;if(dD===pD){score+=15;reasons.push('동일 지역');}else reasons.push('같은 권역');}
  else if(driver.viaCity===pCity){score+=20;reasons.push('경유지 포함');}
  if(gm){score+=15;reasons.push('같은 정문');}
  const diff=Math.abs(timeToMin(driver.depart)-timeToMin(passenger.depart));
  if(diff<=15){score+=25;reasons.push('출발시간 거의 동일');}
  else if(diff<=30){score+=18;reasons.push('출발시간 30분 이내');}
  else if(diff<=60){score+=8;reasons.push('출발시간 1시간 이내');}
  if(driver.seats>0)score+=5;
  score=Math.min(score,99);
  return score<20?null:{score,reason:reasons.slice(0,2).join(' · ')||'경로 부분 겹침'};
}
function genderOk(driver,me){
  if(!me)return true;
  if(driver.pref!=='any'&&driver.pref!==me.gender)return false;
  if(me.pref!=='any'&&me.pref!==driver.gender)return false;
  return true;
}
function timeToMin(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}

function driverCardHTML(c,matchInfo,gOk,me){
  const isClosed=c.status==='closed';
  const addr=(c.dir==='to'&&c.startAddr)?c.startAddr:(c.dir==='from'&&c.endAddr)?c.endAddr:'';
  const via=c.viaCity&&c.viaDist?`경유: ${c.viaCity} ${c.viaDist}`:'';
  const dimClass=isClosed?'closed':(me&&(!gOk||!matchInfo))?'dimmed':'';
  const gBdg=c.gender==='female'?'bdg-f':'bdg-m';
  return `<div class="ccard ${dimClass}" id="card-${c.id}">
    <div class="ch">
      <div class="cname-wrap">
        <div class="cname">${c.name}
          <span class="status-badge ${isClosed?'status-closed':'status-open'}" style="font-size:10px">${isClosed?'마감':'모집중'}</span>
        </div>
        <div class="cdate">${c.date} ${dayStr(c.date)}</div>
      </div>
      <div class="cbadges">
        <span class="bdg bdg-dir">${c.dir==='to'?'출근':'퇴근'}</span>
        <span class="bdg ${gBdg}">${GL[c.gender]}</span>
        ${c.pref!=='any'?`<span class="bdg bdg-pref">${GL[c.pref]} 희망</span>`:''}
      </div>
    </div>
    <div class="croute">${routeLabel(c)}</div>
    ${addr||via?`<div class="caddr">${addr?'&#128205; '+addr:''}${addr&&via?' · ':''}${via}</div>`:''}
    <div class="cmeta"><span>&#128336; ${c.depart}→${c.arrive}</span><span>&#128100; ${c.seats}석</span></div>
    ${c.note?`<div class="cnote">${c.note}</div>`:''}
    ${!isClosed&&matchInfo?`<div class="match-box">
      <div class="match-hd">매칭 적합도</div>
      <div class="mscore-row"><span style="font-size:13px;font-weight:500">이 운전자와의 매칭</span><span class="mscore-num">${matchInfo.score}점</span></div>
      <div class="mwhy">${matchInfo.reason}${!gOk?' · 성별 조건 불일치':''}</div>
      <div class="sbar"><div class="sfill" style="width:${matchInfo.score}%"></div></div>
    </div>`:''}
    ${!isClosed&&me&&!gOk?`<div class="gender-warn">성별 조건이 맞지 않아요</div>`:''}
    ${isClosed?`<div class="closed-msg">매칭 완료된 카풀입니다</div>`:`<button class="btn-contact" onclick="showToast('연락처: ${c.contact}')">연락하기</button>`}
  </div>`;
}

function renderListPage(){
  cleanExpired();
  renderMyCard();
  const el=document.getElementById('list-wrap');
  let data=carpools.filter(x=>x.role==='driver'&&x.dir===filter&&x.id!==myId);
  if(!data.length){el.innerHTML='<div class="empty"><div style="font-size:40px">&#128661;</div><p>등록된 운전자가 없어요.</p></div>';return;}
  const me=myId?carpools.find(x=>x.id===myId):null;
  const scored=data.map(d=>({...d,matchInfo:me&&me.dir===d.dir?calcMatch(d,me):null,gOk:genderOk(d,me)}));
  scored.sort((a,b)=>{
    if(a.status==='closed'&&b.status!=='closed')return 1;
    if(b.status==='closed'&&a.status!=='closed')return -1;
    if(me){if(a.gOk!==b.gOk)return a.gOk?-1:1;}
    return (b.matchInfo?.score||0)-(a.matchInfo?.score||0);
  });
  el.innerHTML=scored.map(c=>driverCardHTML(c,c.matchInfo,c.gOk,me)).join('');
}

function fillForm(c,skipDate){
  role=c.role;
  segSet('role-seg',c.role==='driver'?0:1);
  document.getElementById('contact-wrap').style.display=c.role==='driver'?'flex':'none';
  document.getElementById('via-wrap').style.display=c.role==='driver'?'block':'none';
  document.getElementById('seat-wrap').style.display=c.role==='driver'?'block':'none';
  document.getElementById('pref-label').textContent=c.role==='driver'?'탑승 희망자 성별':'운전 희망자 성별';
  document.getElementById('btn-submit').textContent=c.role==='passenger'?'카풀 매칭':'등록하기';
  document.getElementById('r-name').value=c.name||'';
  if(c.role==='driver'){const rc=document.getElementById('r-contact');if(rc)rc.value=c.contact||'';}
  myGender=c.gender||'male';myPref=c.pref||'any';
  segSet('gender-seg',myGender==='male'?0:1);
  segSet('pref-seg',myPref==='any'?0:myPref==='male'?1:2);
  direction=c.dir;
  segSet('dir-seg',c.dir==='to'?0:1);
  renderStartWrap();renderEndWrap();
  const dateVal=skipDate?todayStr():(c.date||todayStr());
  document.getElementById('r-date').value=dateVal;
  document.getElementById('r-day').value=dayStr(dateVal);
  setTimeout(()=>{
    if(c.dir==='to'){
      const sc=document.getElementById('r-start-city');if(sc){sc.value=c.startCity||'';updateDist('start');}
      setDistVal('start',c.startDist||'');
      setTimeout(()=>{const sa=document.getElementById('r-start-addr');if(sa)sa.value=c.startAddr||'';},120);
      setTimeout(()=>{const eg=document.getElementById('r-end-gate');if(eg)eg.value=c.endGate||'';},50);
    } else {
      const sg=document.getElementById('r-start-gate');if(sg)sg.value=c.startGate||'';
      const ec=document.getElementById('r-end-city');if(ec){ec.value=c.endCity||'';updateDist('end');}
      setDistVal('end',c.endDist||'');
      setTimeout(()=>{const ea=document.getElementById('r-end-addr');if(ea)ea.value=c.endAddr||'';},120);
    }
    if(c.role==='driver'&&c.viaCity){
      const vc=document.getElementById('r-via-city');if(vc){vc.value=c.viaCity;updateDist('via');}
      setDistVal('via',c.viaDist||'');
    }
  },40);
  document.getElementById('r-depart').value=c.depart||'07:30';
  document.getElementById('r-arrive').value=c.arrive||'08:00';
  document.getElementById('r-note').value=c.note||'';
  seats=c.seats||3;document.getElementById('seat-n').textContent=seats;
}

function recallLast(){
  if(!lastSaved)return;
  fillForm(lastSaved,true);
  document.getElementById('recall-banner').style.display='block';
  document.getElementById('btn-recall').style.display='none';
  showToast('이전 정보를 불러왔어요');
}

function editCard(id){
  const c=carpools.find(x=>x.id===id);if(!c)return;
  editingId=id;goReg();
  document.getElementById('edit-banner').style.display='block';
  document.getElementById('btn-cancel').style.display='block';
  document.getElementById('btn-recall').style.display='none';
  document.getElementById('btn-submit').textContent='수정 저장하기';
  fillForm(c,false);
  window.scrollTo(0,0);
  showToast('수정할 내용을 변경 후 저장하세요');
}

function cancelEdit(){
  editingId=null;resetForm();
  document.getElementById('edit-banner').style.display='none';
  document.getElementById('recall-banner').style.display='none';
  document.getElementById('btn-cancel').style.display='none';
}

function resetForm(){
  ['r-name','r-contact','r-note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  role='driver';seats=3;direction='to';myGender='male';myPref='any';editingId=null;
  segSet('role-seg',0);segSet('dir-seg',0);segSet('gender-seg',0);segSet('pref-seg',0);
  document.getElementById('contact-wrap').style.display='flex';
  document.getElementById('via-wrap').style.display='block';
  document.getElementById('seat-wrap').style.display='block';
  document.getElementById('pref-label').textContent='탑승 희망자 성별';
  document.getElementById('btn-submit').textContent='등록하기';
  document.getElementById('seat-n').textContent='3';
  document.getElementById('r-depart').value='07:30';
  document.getElementById('r-arrive').value='08:00';
  document.getElementById('r-date').value=todayStr();
  document.getElementById('r-day').value=dayStr(todayStr());
  document.getElementById('recall-banner').style.display='none';
  document.getElementById('btn-recall').style.display=lastSaved?'block':'none';
  const vd=document.getElementById('r-via-dist');if(vd){vd.innerHTML='<option value="">-</option>';vd.disabled=true;}
  document.getElementById('r-via-city').value='';
  renderStartWrap();renderEndWrap();
}

function submitReg(){
  const name=document.getElementById('r-name').value.trim();
  if(!name){showToast('이름을 입력해주세요');return;}
  let contact='';
  if(role==='driver'){contact=document.getElementById('r-contact').value.trim();if(!contact){showToast('연락처를 입력해주세요');return;}}
  const date=document.getElementById('r-date').value;
  if(!date){showToast('날짜를 선택해주세요');return;}
  let startCity='',startDist='',startAddr='',startGate='',endCity='',endDist='',endAddr='',endGate='';
  if(direction==='to'){
    startCity=document.getElementById('r-start-city')?.value||'';
    startDist=document.getElementById('r-start-dist')?.value||'';
    startAddr=document.getElementById('r-start-addr')?.value.trim()||'';
    endGate=document.getElementById('r-end-gate')?.value||'';
    if(!startCity||!startDist){showToast('출발지를 선택해주세요');return;}
    if(!endGate){showToast('목적지 정문을 선택해주세요');return;}
  } else {
    startGate=document.getElementById('r-start-gate')?.value||'';
    endCity=document.getElementById('r-end-city')?.value||'';
    endDist=document.getElementById('r-end-dist')?.value||'';
    endAddr=document.getElementById('r-end-addr')?.value.trim()||'';
    if(!startGate){showToast('출발 정문을 선택해주세요');return;}
    if(!endCity||!endDist){showToast('목적지를 선택해주세요');return;}
  }
  const viaCity=role==='driver'?(document.getElementById('r-via-city')?.value||''):'';
  const viaDist=role==='driver'?(document.getElementById('r-via-dist')?.value||''):'';
  const obj={name,contact,role,dir:direction,date,gender:myGender,pref:myPref,startCity,startDist,startAddr,startGate,viaCity,viaDist,endCity,endDist,endAddr,endGate,depart:document.getElementById('r-depart').value,arrive:document.getElementById('r-arrive').value,seats:role==='driver'?seats:0,note:document.getElementById('r-note').value.trim(),status:'open',ts:Date.now()};
  lastSaved={...obj};
  if(editingId!==null){
    const idx=carpools.findIndex(x=>x.id===editingId);
    if(idx>-1)carpools[idx]={...carpools[idx],...obj,status:carpools[idx].status};
    showToast('수정 완료!');cancelEdit();goList();
  } else {
    const newId=nextId++;
    carpools.unshift({id:newId,...obj});
    myId=newId;
    showToast('등록 완료!');resetForm();goList();
  }
}

function delMyCard(id){
  const c=carpools.find(x=>x.id===id);
  if(c)lastSaved={...c};
  carpools=carpools.filter(x=>x.id!==id);
  if(myId===id)myId=null;
  document.getElementById('btn-recall').style.display=lastSaved?'block':'none';
  renderListPage();
  showToast('삭제됐어요');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// 초기화
renderStartWrap();renderEndWrap();
document.getElementById('r-date').value=todayStr();
document.getElementById('r-day').value=dayStr(todayStr());
document.getElementById('contact-wrap').style.display='flex';
